<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Krisvakt Sverige</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;font-family:'Inter',sans-serif;color:#e6edf3;min-height:100vh}
::-webkit-scrollbar{width:6px;background:#0d1117}
::-webkit-scrollbar-thumb{background:#21262d;border-radius:3px}
.wrap{max-width:940px;margin:0 auto;padding:24px 16px}
.topbar{background:#161b22;border-bottom:1px solid #21262d;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:800;color:#f0f6fc;display:flex;align-items:center;gap:10px}
.logo-dot{width:12px;height:12px;border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
.btn{cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;border-radius:8px;padding:7px 14px;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:all .15s}
.btn:hover{background:#30363d;color:#e6edf3}
.btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn.primary:hover{background:#388bfd}
.keybar{background:#161b22;border-bottom:1px solid #21262d;padding:12px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.keyinput{background:#0d1117;border:1px solid #30363d;color:#e6edf3;border-radius:8px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:12px;outline:none;width:280px;transition:border-color .2s}
.keyinput:focus{border-color:#1f6feb}

/* Traffic light */
.biglight{background:#161b22;border:1px solid #21262d;border-radius:16px;padding:32px 24px;text-align:center;position:relative;overflow:hidden}
.biglight-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:240px;height:240px;border-radius:50%;opacity:.10;pointer-events:none}
.light-emoji{font-size:72px;line-height:1;margin-bottom:12px;display:block}
.light-label{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.light-sub{font-size:15px;color:#8b949e;max-width:360px;margin:0 auto;line-height:1.5}
.score-pill{display:inline-block;margin-top:14px;padding:5px 18px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid}
.advice{border-radius:12px;padding:20px 22px;margin-top:16px;border:1px solid;font-size:14px;line-height:1.7}
.advice h3{font-size:14px;font-weight:700;margin-bottom:8px}
.advice ul{padding-left:18px}
.advice li{margin-bottom:4px;color:#c9d1d9}

.sec-title{font-size:12px;font-weight:600;color:#484f58;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;margin-top:28px;display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#21262d;color:#3fb950;border:1px solid #3fb95030;font-weight:500;text-transform:none;letter-spacing:0}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.cards,.conflict-grid,.future-grid{grid-template-columns:1fr!important}}
.card{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:18px;cursor:pointer;transition:all .18s}
.card:hover{border-color:#30363d;transform:translateY(-2px)}
.card.active{border-color:#1f6feb!important}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-name{font-size:13px;font-weight:600;color:#c9d1d9}
.card-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.04em}
.card-value{font-size:34px;font-weight:800;line-height:1;letter-spacing:-1px;margin-bottom:2px}
.card-desc{font-size:11px;color:#484f58;margin-bottom:10px}
.card-meter{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-bottom:8px}
.card-meter-fill{height:100%;border-radius:2px;transition:width .6s ease}
.card-explain{font-size:11px;color:#6e7681;line-height:1.5}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3fb950;margin-right:4px;animation:pulse 2s infinite}

.detail{background:#161b22;border:1px solid #21262d;border-radius:12px;padding:22px;margin-top:4px}
.detail-stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px}
.stat{font-size:12px;color:#484f58}
.stat span{color:#c9d1d9;font-weight:600}
.chart-wrap{width:100%;overflow:hidden;border-radius:8px;background:#0d1117;padding:10px 8px 4px}

.conflict-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.conflict-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:14px 16px}
.conflict-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.conflict-flag{font-size:22px;line-height:1}
.conflict-name{font-size:13px;font-weight:600;color:#e6edf3;flex:1}
.conflict-intensity{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.05em}
.conflict-bar{height:3px;background:#21262d;border-radius:2px;margin-top:8px;overflow:hidden}
.conflict-bar-fill{height:100%;border-radius:2px}

.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,#f85149,#d29922,#58a6ff,#f0883e,#bc8cff)}
.tl-event{position:relative;margin-bottom:20px;padding:16px 18px;background:#161b22;border:1px solid #21262d;border-radius:10px}
.tl-year{font-size:10px;font-weight:700;letter-spacing:.1em;margin-bottom:4px}
.tl-title{font-size:14px;font-weight:700;color:#e6edf3;margin-bottom:6px}
.tl-desc{font-size:12px;color:#8b949e;line-height:1.6;margin-bottom:10px}
.tl-indicators{display:flex;flex-wrap:wrap;gap:6px}
.tl-ind{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:600}
.tl-lesson{font-size:11px;padding:8px 12px;border-radius:8px;border-left:3px solid;margin-top:10px;line-height:1.6;color:#c9d1d9}

/* Future */
.future-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.future-full{grid-column:1/-1}

.doomsday-card{background:#161b22;border:2px solid #f8514940;border-radius:14px;padding:22px;text-align:center;position:relative;overflow:hidden}
.doomsday-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(248,81,73,.08),transparent 60%);pointer-events:none}
.clock-face{width:110px;height:110px;border-radius:50%;border:4px solid #f85149;margin:0 auto 14px;position:relative;background:#0d1117;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(248,81,73,.2)}
.clock-hand{position:absolute;bottom:50%;left:50%;width:3px;height:42px;background:#f85149;transform-origin:bottom center;border-radius:2px;box-shadow:0 0 8px #f85149}
.clock-center{width:8px;height:8px;background:#f8fafc;border-radius:50%;position:absolute}
.clock-12{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:9px;color:#484f58;font-weight:700}

.vdem-card{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:20px}
.vdem-country{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #21262d}
.vdem-country:last-child{border-bottom:none}
.vdem-bar-wrap{width:100px;height:6px;background:#21262d;border-radius:3px;overflow:hidden;flex-shrink:0}
.vdem-bar{height:100%;border-radius:3px}

.milspend-card{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:20px}
.milspend-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #21262d}
.milspend-row:last-child{border-bottom:none}
.milspend-bar-wrap{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.milspend-bar{height:100%;border-radius:3px}

.leaders-card{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:20px}
.leader-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #21262d}
.leader-row:last-child{border-bottom:none}
.leader-flag{font-size:24px;flex-shrink:0;margin-top:2px}
.leader-info{flex:1;min-width:0}
.leader-name{font-size:13px;font-weight:700;color:#e6edf3}
.leader-role{font-size:11px;color:#484f58;margin-top:1px;margin-bottom:4px}
.leader-desc{font-size:11px;color:#6e7681;line-height:1.5}
.leader-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.leader-risk{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;letter-spacing:.05em;white-space:nowrap}
.risk-meter{width:70px;height:5px;background:#21262d;border-radius:3px;overflow:hidden}
.risk-meter-fill{height:100%;border-radius:3px}

.ai-card{background:#161b22;border:1px solid #21262d;border-radius:14px;padding:20px}
.ai-risk-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #21262d;align-items:flex-start}
.ai-risk-item:last-child{border-bottom:none}
.ai-risk-icon{font-size:26px;flex-shrink:0;line-height:1;margin-top:2px}
.ai-risk-level{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-bottom:4px;display:inline-block;letter-spacing:.05em}

.election-card{background:#161b22;border:2px solid #006AA720;border-radius:14px;padding:20px;position:relative;overflow:hidden}
.election-card::before{content:'🇸🇪';position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.06}
.party-row{display:flex;align-items:center;gap:10px;padding:5px 0}
.party-bar-wrap{flex:1;height:7px;background:#21262d;border-radius:4px;overflow:hidden}
.party-bar{height:100%;border-radius:4px}
.party-name{font-size:12px;color:#c9d1d9;width:110px;flex-shrink:0}
.party-pct{font-size:12px;font-weight:600;width:32px;text-align:right;flex-shrink:0}

/* FAO Food card */
.fao-card{background:#161b22;border:2px solid #3fb95030;border-radius:14px;padding:20px;position:relative;overflow:hidden}
.fao-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(63,185,80,.05),transparent 60%);pointer-events:none}
.fao-big{font-size:42px;font-weight:800;letter-spacing:-2px;line-height:1}
.fao-chart{width:100%;height:70px;margin-top:10px}
.fao-event{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #21262d;font-size:11px}
.fao-event:last-child{border-bottom:none}

/* WHO Pandemic card */
.who-card{background:#161b22;border:2px solid #58a6ff30;border-radius:14px;padding:20px;position:relative;overflow:hidden}
.who-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(88,166,255,.05),transparent 60%);pointer-events:none}
.who-country{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #21262d}
.who-country:last-child{border-bottom:none}
.who-bar-wrap{flex:1;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.who-bar{height:100%;border-radius:3px}

.info-box{background:#0d1117;border-radius:8px;padding:12px 14px;border-left:3px solid;font-size:12px;color:#c9d1d9;line-height:1.7;margin-bottom:12px}
.loading-bar{height:2px;background:linear-gradient(90deg,#1f6feb,#bc8cff,#3fb950,#f85149,#1f6feb);background-size:400%;animation:lb 2s linear infinite;position:fixed;top:0;left:0;right:0;z-index:999;display:none}
@keyframes lb{0%{background-position:0%}100%{background-position:400%}}
.fadein{animation:fi .4s ease both}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.footer{margin-top:32px;padding:20px;text-align:center;font-size:11px;color:#21262d;line-height:1.9;border-top:1px solid #21262d}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block}
</style>
</head>

<script>
// ─── API helpers ──────────────────────────────────────────────────────────────
async function fetchFRED(id,key,lim){
  var r=await fetch('https://api.stlouisfed.org/fred/series/observations?series_id='+id+'&api_key='+key+'&file_type=json&limit='+(lim||60)+'&sort_order=desc');
  var d=await r.json();
  if(d.error_message) throw new Error(d.error_message);
  return d.observations.filter(o=>o.value!=='.').map(o=>({month:o.date,value:parseFloat(o.value)})).reverse();
}
async function fetchSCB(){
  var r=await fetch('https://api.scb.se/OV0104/v1/doris/sv/ssd/START/FM/FM5001/FM5001A/FinTillgSkuld',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({query:[{code:'Balanspost',selection:{filter:'item',values:['6']}},{code:'Sektor',selection:{filter:'item',values:['Hush']}}],response:{format:'json'}})
  });
  var d=await r.json();
  return (d.data||[]).slice(-24).map(r=>({month:r.key[r.key.length-1],value:parseFloat(r.values[0])})).filter(r=>!isNaN(r.value));
}
async function fetchUCDP(){
  var r=await fetch('https://ucdpapi.pcr.uu.se/api/conflicts/24.1?pagesize=20',{headers:{'Accept':'application/json'}});
  var d=await r.json();
  return (d.Result||[]).slice(0,12);
}
// FAO Food Price Index — open REST API, no key needed
async function fetchFAO(){
  // FAO FPMA API for food price index
  var r=await fetch('https://fpma.fao.org/giews/fpmat4/api/v1/indices?format=json&type=nominal&num=12',{headers:{'Accept':'application/json'}});
  var d=await r.json();
  return d;
}

// ─── Sim fallback data ────────────────────────────────────────────────────────
function gen(base,vol,len,trend){
  len=len||24;trend=trend||0;
  return Array.from({length:len},(_,i)=>({month:(2024+Math.floor(i/12))+'-'+('0'+((i%12)+1)).slice(-2),value:+(base+trend*i+(Math.random()-.5)*vol).toFixed(2)}));
}

  housing:gen(5.2,.4,24,.08),bank_cet1:gen(20,.8,24,-.07),
  geo_risk:gen(100,30,24,1.5)
};

function calcScore(){
  var t=0,w=0;
  S.inds.forEach(i=>{
    if(i.current==null) return;
    var r=i.direction==='up'?i.current/i.threshold:(i.threshold===0?(i.current<0?1.5:.3):i.current/i.threshold);
    t+=Math.min(Math.max(r,0),1.5)/1.5*i.weight; w+=i.weight;
  });
  return w===0?50:Math.min(Math.round((t/w)*100),100);
}

function spark(data,color,threshold){
  if(!data||data.length<2) return '';
  var vals=data.slice(-20).map(d=>d.value);
  var mos=data.slice(-20).map(d=>d.month||d.year||'');
  var W=600,H=60,pl=4,pr=4,pt=6,pb=18;
  var iw=W-pl-pr,ih=H-pt-pb;
  var mn=Math.min(...vals,threshold)*.94,mx=Math.max(...vals,threshold)*1.06;
  var xs=i=>pl+i/(vals.length-1)*iw;
  var ys=v=>pt+ih-((v-mn)/(mx-mn||1))*ih;
  var pts=vals.map((v,i)=>xs(i)+','+ys(v)).join(' ');
  var area=pl+','+(pt+ih)+' '+pts+' '+(pl+iw)+','+(pt+ih);
  var thY=ys(threshold);
  var uid='g'+Math.random().toString(36).slice(2,7);
  var labs=mos.map((m,i)=>{if(i%5!==0||!m) return '';return '<text x="'+xs(i)+'" y="'+H+'" fill="#484f58" font-size="8" text-anchor="middle" font-family="sans-serif">'+m.slice(0,7)+'</text>';}).join('');
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block;overflow:visible">'
    +'<defs><linearGradient id="'+uid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".25"/><stop offset="100%" stop-color="'+color+'" stop-opacity=".02"/></linearGradient></defs>'
    +'<polygon points="'+area+'" fill="url(#'+uid+')"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +(thY>=pt&&thY<=pt+ih?'<line x1="'+pl+'" y1="'+thY+'" x2="'+(pl+iw)+'" y2="'+thY+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>':'')
    +vals.map((v,i)=>i===vals.length-1?'<circle cx="'+xs(i)+'" cy="'+ys(v)+'" r="3.5" fill="'+color+'" stroke="#161b22" stroke-width="1.5"/>':'').join('')
    +labs+'</svg>';
}

// FAO chart — larger, with event markers
function faoChart(data){
  if(!data||data.length<2) return '';
  var vals=data.map(d=>d.value);
  var W=700,H=90,pl=4,pr=4,pt=8,pb=20;
  var iw=W-pl-pr,ih=H-pt-pb;
  var mn=Math.min(...vals)*.9,mx=Math.max(...vals)*1.05;
  var xs=i=>pl+i/(vals.length-1)*iw;
  var ys=v=>pt+ih-((v-mn)/(mx-mn||1))*ih;
  var pts=vals.map((v,i)=>xs(i)+','+ys(v)).join(' ');
  var area=pl+','+(pt+ih)+' '+pts+' '+(pl+iw)+','+(pt+ih);
  var uid='fao'+Math.random().toString(36).slice(2,7);
  // Reference line at 115 (pre-crisis baseline)
  var refY=ys(115);
  var dots=data.map((d,i)=>{
    if(!d.event) return '';
    var cx=xs(i),cy=ys(d.value);
    return '<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#f85149" stroke="#161b22" stroke-width="1.5"/>';
  }).join('');
  var labs=data.map((d,i)=>{
    if(i%4!==0) return '';
    return '<text x="'+xs(i)+'" y="'+H+'" fill="#484f58" font-size="8" text-anchor="middle" font-family="sans-serif">'+d.year+'</text>';
  }).join('');
  return '<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block;overflow:visible">'
    +'<defs><linearGradient id="'+uid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3fb950" stop-opacity=".2"/><stop offset="100%" stop-color="#3fb950" stop-opacity=".02"/></linearGradient></defs>'
    +'<polygon points="'+area+'" fill="url(#'+uid+')"/>'
    +'<polyline points="'+pts+'" fill="none" stroke="#3fb950" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +(refY>=pt&&refY<=pt+ih?'<line x1="'+pl+'" y1="'+refY+'" x2="'+(pl+iw)+'" y2="'+refY+'" stroke="#484f58" stroke-width="1" stroke-dasharray="3,3"/><text x="'+(pl+4)+'" y="'+(refY-3)+'" fill="#484f58" font-size="8" font-family="sans-serif">normalnivå</text>':'')
    +dots+labs+'</svg>';
}

      +crises.map(c=>'<div class="fao-event"><span style="font-size:16px">🌾</span><span style="font-weight:700;color:#f85149;width:38px;flex-shrink:0">'+c.year+'</span><span style="font-size:11px;color:#e6edf3;flex:1">Index: <strong>'+c.value+'</strong></span><span style="font-size:11px;color:#c9d1d9">'+c.event+'</span></div>').join('')
    +'</div>'

// ─── NEW: WHO Pandemic Preparedness ──────────────────────────────────────────

    +'<div style="display:flex;gap:24px;margin-bottom:14px;flex-wrap:wrap">'
      +'<div><div style="font-size:38px;font-weight:800;color:#3fb950;letter-spacing:-1px;line-height:1">'+sweScore+'</div><div style="font-size:11px;color:#484f58;margin-top:2px">Sveriges poäng · Max 100</div></div>'
      +'<div style="display:flex;flex-direction:column;justify-content:center;gap:4px;font-size:12px;">'
        +'<div style="color:#484f58">Världssnitt: <strong style="color:#d29922">'+worldAvg+'</strong></div>'

    +WHO_DATA.map(c=>{

    +'</div>'
    +'<div style="font-size:10px;color:#21262d;margin-top:8px">Källa: WHO Global Health Security Index 2021 · Nuclear Threat Initiative & Johns Hopkins Center</div>'
  +'</div>';
}

// ─── Main render ──────────────────────────────────────────────────────────────
function render(){
  var sc=calcScore(),lv=level(sc);
  var sel=S.inds.find(i=>i.id===S.selected)||S.inds[0];
  var redCount=S.inds.filter(triggered).length;
  var t=S.activeTab;

  var cardsHTML=S.inds.map(ind=>{
    var on=triggered(ind),isSel=S.selected===ind.id,pct=meterPct(ind);
    return '<div class="card'+(isSel?' active':'')+'" data-id="'+ind.id+'" style="border-color:'+(isSel?'#1f6feb':on?ind.color+'40':'#21262d')+'">'
      +'<div class="card-top"><div class="card-name">'+ind.emoji+' '+ind.name+'</div><span class="card-tag" style="background:'+(on?ind.color+'22':'#21262d')+';color:'+(on?ind.color:'#484f58')+'">'+(S.loading[ind.id]?'…':on?'⚠ Varning':'OK')+'</span></div>'
      +'<div class="card-value" style="color:'+(on?ind.color:'#e6edf3')+'">'+(S.loading[ind.id]?'…':ind.current)+(ind.unit?'<span style="font-size:15px;color:#484f58;font-weight:500"> '+ind.unit+'</span>':'')+'</div>'
      +'<div class="card-desc">'+(ind.live?'<span class="live-dot"></span>':'')+'Varningsgräns: '+ind.threshold+(ind.unit?' '+ind.unit:'')+'</div>'
      +'<div class="card-meter"><div class="card-meter-fill" style="width:'+pct+'%;background:'+ind.color+'"></div></div>'
      +'<div class="card-explain">'+ind.goodBad+'</div></div>';
  }).join('');

  var conflHTML=KNOWN_CONFLICTS.map(c=>'<div class="conflict-card"><div class="conflict-header"><span class="conflict-flag">'+c.flag+'</span><span class="conflict-name">'+c.name+'</span><span class="conflict-intensity" style="background:'+c.intensity.bg+';color:'+c.intensity.color+'">'+c.intensity.label+'</span></div><div style="font-size:11px;color:#484f58;margin-top:2px">💀 Döda: '+c.deaths+' · Sedan '+c.started+'</div><div class="conflict-bar"><div class="conflict-bar-fill" style="width:'+c.pct+'%;background:'+c.intensity.color+'"></div></div></div>').join('');

  var histHTML='<div class="timeline">'+HISTORY.map(ev=>{
    var indHTML=ev.indicators.map(i=>'<span class="tl-ind" style="background:'+i.c+'22;color:'+i.c+'">'+i.label+'</span>').join('');
    return '<div class="tl-event" style="border-color:'+ev.color+'30">'
      +'<div style="position:absolute;left:-20px;top:18px;width:10px;height:10px;border-radius:50%;background:'+ev.color+';border:2px solid #0d1117"></div>'
      +'<div class="tl-year" style="color:'+ev.color+'">'+ev.year+'</div>'
      +'<div class="tl-title">'+ev.title+'</div>'
      +'<div class="tl-desc">'+ev.desc+'</div>'
      +'<div class="tl-indicators">'+indHTML+'</div>'
      +'<div class="tl-lesson" style="background:'+ev.lc+'0a;border-left-color:'+ev.lc+'40">💡 '+ev.lesson+'</div>'
    +'</div>';
  }).join('')+'</div>';

  document.getElementById('app').innerHTML=
  '<div>'
    +'<div class="topbar">'
      +'<div class="logo"><div class="logo-dot" style="background:'+lv.color+'"></div>Krisvakt Sverige</div>'
      +'<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
        +(S.lastUpdated?'<span style="font-size:11px;color:#484f58">'+S.lastUpdated.toLocaleTimeString('sv-SE')+'</span>':'')
        +'<button class="btn" id="toggleKey">⚙ FRED-nyckel</button>'
        +'<button class="btn primary" id="refreshBtn">↻ Uppdatera</button>'
      +'</div>'
    +'</div>'
    +(S.showKey?'<div class="keybar"><span style="font-size:11px;color:#8b949e">FRED-nyckel:</span><input class="keyinput" id="fredKeyInput" type="text" value="'+S.fredKey+'" placeholder="Gratis: fred.stlouisfed.org"/><button class="btn primary" id="activateFred" '+(S.fredKey?'':'disabled')+'>▶ Aktivera</button></div>':'')
    +'<div class="wrap">'
      +'<div class="biglight"><div class="biglight-glow" style="background:'+lv.color+'"></div><span class="light-emoji">'+lv.emoji+'</span><div class="light-label" style="color:'+lv.color+'">'+lv.label+'</div><div class="light-sub">'+(redCount>0?redCount+' av '+S.inds.length+' indikatorer visar varning':'Alla indikatorer inom normala nivåer')+'</div><div class="score-pill" style="color:'+lv.color+';background:'+lv.bg+';border-color:'+lv.border+'">Riskpoäng '+sc+'/100</div></div>'
      +'<div class="advice fadein" style="background:'+lv.bg+';border-color:'+lv.border+'"><h3 style="color:'+lv.color+'">'+lv.emoji+' '+lv.advice.title+'</h3><ul>'+lv.advice.points.map(p=>'<li>'+p+'</li>').join('')+'</ul></div>'

      // Tabs
      +'<div style="display:flex;gap:8px;margin-top:28px;flex-wrap:wrap">'
        +'<button class="btn'+(t==='indicators'?' primary':'')+'" data-tab="indicators">📊 Indikatorer</button>'
        +'<button class="btn'+(t==='future'?' primary':'')+'" data-tab="future">🔮 Framtidsrisker</button>'
        +'<button class="btn'+(t==='conflicts'?' primary':'')+'" data-tab="conflicts">⚔️ Aktiva konflikter</button>'
        +'<button class="btn'+(t==='history'?' primary':'')+'" data-tab="history">📜 Historiska kriser</button>'
      +'</div>'

      // INDICATORS
      +(t==='indicators'?'<div class="fadein"><div class="sec-title" style="margin-top:20px">Ekonomiska indikatorer</div><div class="cards">'+cardsHTML+'</div><div class="sec-title">🔍 Detaljvy</div><div class="detail"><h3 style="color:'+sel.color+'">'+sel.emoji+' '+sel.name+'</h3><div style="font-size:13px;color:#8b949e;line-height:1.6;margin-bottom:10px">'+sel.simple+'</div><div class="info-box" style="border-color:'+sel.color+'">💡 <strong style="color:'+sel.color+'">Hur tolkar jag det?</strong><br>'+sel.goodBad+'</div><div class="detail-stats"><div class="stat">Aktuellt: <span>'+sel.current+(sel.unit?' '+sel.unit:'')+'</span></div><div class="stat">Varningsgräns: <span>'+sel.threshold+(sel.unit?' '+sel.unit:'')+'</span></div><div class="stat">Status: <span style="color:'+(triggered(sel)?sel.color:'#3fb950')+'">'+(triggered(sel)?'⚠ Varning':'✓ OK')+'</span></div><div class="stat">Källa: <span>'+(sel.live?'<span style="color:#3fb950">● Live</span>':'Simulerad')+'</span></div></div><div class="chart-wrap">'+spark(sel.history,sel.color,sel.threshold)+'</div></div></div>':'')

      // FUTURE RISKS
      +(t==='future'?'<div class="fadein"><div class="sec-title" style="margin-top:20px">Framtidsrisker <span class="sec-badge" style="color:#bc8cff;border-color:#bc8cff30">v6.0 — Uppdaterad</span></div><div class="future-grid">'+doomsdayHTML()+vdemHTML()+'</div><div class="future-grid">'+milHTML()+'<div style="display:flex;flex-direction:column;gap:14px"></div></div><div class="future-grid">'+faoHTML()+'</div><div class="future-grid">'+whoHTML()+'</div><div class="future-grid">'+leadersHTML()+'</div><div class="future-grid">'+aiHTML()+'</div><div class="future-grid">'+electionHTML()+'</div></div>':'')

      // CONFLICTS
      +(t==='conflicts'?'<div class="fadein"><div class="sec-title" style="margin-top:20px">Aktiva väpnade konflikter (UCDP Uppsala)</div><div class="info-box" style="border-color:#58a6ff;margin-bottom:12px">⚡ <strong style="color:#c9d1d9">Varför krig påverkar din ekonomi:</strong> Ukrainakriget 2022 gav Sverige 10% inflation och snabba räntehöjningar som drabbade alla med bolån.</div><div class="conflict-grid">'+conflHTML+'</div><div style="font-size:10px;color:#21262d;margin-top:10px;text-align:right">Källa: UCDP Uppsala Universitet · ucdp.uu.se</div></div>':'')

      // HISTORY
      +(t==='history'?'<div class="fadein"><div class="sec-title" style="margin-top:20px">Historiska kriser — vad kan vi lära oss?</div><div style="font-size:12px;color:#484f58;margin-bottom:16px;line-height:1.6">Nu med FAO matpriser inlagda — se hur de föregick Arabiska våren och Ukrainakriget.</div>'+histHTML+'</div>':'')

      +'<div class="footer">Krisvakt Sverige v6.0 · SCB · FRED (Fed St. Louis) · UCDP Uppsala · V-Dem GU · SIPRI Stockholm · FAO Food Price Index · WHO Global Health Security Index · Bulletin of Atomic Scientists · EJ finansiell rådgivning</div>'
    +'</div>'
  +'</div>';

  // Events
  document.getElementById('toggleKey').onclick=()=>{S.showKey=!S.showKey;render()};
  document.getElementById('refreshBtn').onclick=()=>loadAll(S.fredKey);
  var ki=document.getElementById('fredKeyInput');if(ki)ki.oninput=function(){S.fredKey=this.value;render()};
  var af=document.getElementById('activateFred');if(af)af.onclick=()=>{S.showKey=false;loadAll(S.fredKey)};
  document.querySelectorAll('.card[data-id]').forEach(el=>el.onclick=function(){S.selected=this.dataset.id;render()});
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=function(){S.activeTab=this.dataset.tab;render()});
}

// ─── Data loading ─────────────────────────────────────────────────────────────
async function loadEconomic(key){
  var ni=DEFS.map(d=>Object.assign({},d,{current:DEFVAL[d.id],live:false,history:FB[d.id]}));
  function setI(id,p){var i=ni.findIndex(x=>x.id===id);if(i>=0)Object.assign(ni[i],p)}
  S.loading=Object.assign({},S.loading,{household_debt:true});render();
  try{var d=await fetchSCB();if(d.length)setI('household_debt',{current:d[d.length-1].value,live:true,history:d})}catch(e){}
  S.loading=Object.assign({},S.loading,{household_debt:false});
  if(key){
    for(var def of DEFS.filter(d=>d.apiType==='fred'&&d.fredId)){
      S.loading=Object.assign({},S.loading,{[def.id]:true});render();
      try{var fd=await fetchFRED(def.fredId,key,60);if(fd.length)setI(def.id,{current:fd[fd.length-1].value,live:true,history:fd.slice(-24)})}catch(e){}
      S.loading=Object.assign({},S.loading,{[def.id]:false});
    }
  }
  S.inds=ni;S.lastUpdated=new Date();
}
async function loadConflicts(){
  try{var d=await fetchUCDP();S.conflicts=d;}catch(e){S.conflicts=[];}
  S.conflictsLoading=false;render();
}
async function loadFAO(){
  try{
    // Try to fetch FAO GIEWS food price data
    var r=await fetch('https://fpma.fao.org/giews/fpmat4/api/v1/indices?type=nominal');
    if(r.ok){
      var d=await r.json();
      // Parse latest value if available
      if(d&&d.length>0){
        var latest=d[d.length-1];
        if(latest&&latest.value) S.faoLatest=Math.round(latest.value);
        S.faoLive=true;
      }
    }
  }catch(e){/* use static data */}
  render();
}
async function loadAll(key){
  document.getElementById('loadbar').style.display='block';
  await Promise.all([loadEconomic(key),loadConflicts(),loadFAO()]);
  document.getElementById('loadbar').style.display='none';
  render();
}

render();
loadAll(S.fredKey);
</script>
